<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VACUNORTE - Calendario de Posteos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #1B9EAD; margin-bottom: 20px; text-align: center; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { background: white; padding: 15px; border-radius: 8px; min-height: 100px; border: 1px solid #ddd; }
        .day-number { font-weight: bold; color: #1B9EAD; }
        .day-content { font-size: 12px; margin-top: 5px; }
        .estado-grabar { color: red; }
        .estado-edicion { color: orange; }
        .estado-publicacion { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 CALENDARIO VACUNORTE - ABRIL 2026</h1>
        <div class="calendar" id="calendar"></div>
    </div>

    <script>
        // Datos de abril 2026
        const eventos = [
            { fecha: 7, idea: "Inicio campaña", estado: "POR GRABAR" },
            { fecha: 8, idea: "Día Salud Universal", estado: "POR GRABAR" },
            { fecha: 10, idea: "Día Derechos Humanos", estado: "POR GRABAR" },
            { fecha: 11, idea: "Fundación Riobamba", estado: "POR GRABAR" },
            { fecha: 14, idea: "Día Chagas", estado: "POR GRABAR" },
            { fecha: 15, idea: "Cáncer Infantil", estado: "POR GRABAR" },
            { fecha: 21, idea: "Independencia Riobamba", estado: "EDICIÓN" },
            { fecha: 24, idea: "Día Tuberculosis", estado: "EDICIÓN" },
            { fecha: 25, idea: "Día Malaria", estado: "PUBLICACIÓN" },
            { fecha: 28, idea: "Seguridad Salud", estado: "POR GRABAR" },
            { fecha: 30, idea: "Enfermedades Tropicales", estado: "POR GRABAR" },
        ];

        const calendar = document.getElementById('calendar');
        
        // Crear 30 días
        for (let i = 1; i <= 30; i++) {
            const day = document.createElement('div');
            day.className = 'day';
            
            const evento = eventos.find(e => e.fecha === i);
            
            day.innerHTML = `
                <div class="day-number">${i}</div>
                ${evento ? `
                    <div class="day-content">
                        <strong>${evento.idea}</strong>
                        <div class="estado-${evento.estado.toLowerCase().replace(' ', '-')}">${evento.estado}</div>
                    </div>
                ` : ''}
            `;
            
            calendar.appendChild(day);
        }
    </script>
</body>
</html>
