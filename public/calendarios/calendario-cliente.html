<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galatea Estudio — Panel de Contenido</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root { --teal: #1B9EAD; --teal-light: #4FBFCC; --dark: rgb(20, 23, 40); --border: rgba(255, 255, 255, 0.1); }
      body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: #fff; margin: 0; }
      .header { padding: 1.5rem 2rem; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(44, 44, 44, 0.3); }
      .header h1 { font-family: 'Playfair Display', serif; color: var(--teal); font-size: 1.2rem; letter-spacing: 0.15em; text-transform: uppercase; }
      .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
      .month-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; justify-content: center; }
      .month-nav h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; min-width: 200px; text-align: center; }
      .btn-galatea { background: var(--teal); color: white; border: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; transition: 0.3s; }
      .btn-galatea:hover { background: var(--teal-light); transform: scale(1.05); }
      .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
      .day-box { background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); border-radius: 16px; padding: 1rem; min-height: 150px; transition: 0.4s; }
      .day-box:hover { border-color: var(--teal); background: rgba(27, 158, 173, 0.05); }
      .day-number { font-size: 1.5rem; font-weight: 300; opacity: 0.5; text-align: right; }
      .idea-tag { font-size: 12px; color: var(--teal); margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Galatea Estudio</h1>
        <div id="cliente-nombre">Vacunorte</div>
    </div>
    <div class="container">
        <div class="month-nav">
            <button class="btn-galatea" onclick="changeMonth(-1)">Anterior</button>
            <h3 id="mes-actual">Abril 2026</h3>
            <button class="btn-galatea" onclick="changeMonth(1)">Siguiente</button>
        </div>
        <div class="days-grid" id="calendario"></div>
    </div>
    <script type="module" src="calendario-cliente.js"></script>
</body>
</html>
