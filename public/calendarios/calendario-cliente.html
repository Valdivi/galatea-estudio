<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Contenido - Galatea Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div>
            <h1>🎨 Galatea Studio - Calendario</h1>
            <p id="cliente-nombre" style="color: #666;"></p>
        </div>
        <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div class="container">
        <div class="month-selector">
            <button onclick="mesAnterior()">◀ Anterior</button>
            <h3 id="mes-actual"></h3>
            <button onclick="mesSiguiente()">Siguiente ▶</button>
        </div>

        <div class="calendar">
            <h2>📅 Calendario Mensual</h2>
            <div class="days-grid" id="calendario"></div>
        </div>

        <div class="zona-creativa">
            <h2>🎨 ZONA CREATIVA</h2>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Idea</th>
                        <th>Formato</th>
                        <th>Pilar</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="zona-tabla">
                </tbody>
            </table>
        </div>

        <div class="zona-creativa">
            <h2>🎬 CREACIÓN DE CONTENIDO</h2>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Idea</th>
                        <th>Estado</th>
                        <th>Fecha Grabación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="creacion-tabla">
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <h2>Editar Idea</h2>
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="form-nombre">
            </div>
            <div class="form-group">
                <label>Formato:</label>
                <select id="form-formato">
                    <option>Video Profesional</option>
                    <option>Video Text on Screen</option>
                    <option>Video Natural</option>
                    <option>Carrusel</option>
                    <option>Stories Interacción</option>
                </select>
            </div>
            <div class="form-group">
                <label>Pilar:</label>
                <select id="form-pilar">
                    <option>Educación/Aporta Valor</option>
                    <option>Prueba/Validación</option>
                    <option>Identificación/Conciencia</option>
                </select>
            </div>
            <div class="form-group">
                <label>Estado:</label>
                <select id="form-estado">
                    <option>POR GRABAR</option>
                    <option>EDICIÓN</option>
                    <option>PUBLICACIÓN</option>
                </select>
            </div>
            <div class="form-group">
                <label>URL:</label>
                <input type="url" id="form-url">
            </div>
            <div class="form-group">
                <label>Clips:</label>
                <textarea id="form-clips"></textarea>
            </div>
            <div class="form-group">
                <label>Guion:</label>
                <textarea id="form-guion"></textarea>
            </div>
            <div class="form-group">
                <label>Copy Final:</label>
                <textarea id="form-copy"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="guardarEdicion()">Guardar</button>
                <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, obtenerUsuario } from './auth.js';
        
        let usuarioActual = null;
        let clienteActual = null;
        let mesActual = new Date();
        let ideasActuales = [];

        window.logout = async () => {
            await supabase.auth.signOut();
            window.location.href = '/calendarios/login.html';
        };

        async function init() {
            usuarioActual = await obtenerUsuario();
            
            if (!usuarioActual) {
                window.location.href = '/calendarios/login.html';
                return;
            }

            const { data } = await supabase
                .from('auth_users')
                .select('clientes(id, nombre, slug)')
                .eq('user_id', usuarioActual.id)
                .single();

            if (data) {
                clienteActual = data.clientes;
                document.getElementById('cliente-nombre').textContent = clienteActual.nombre;
            }

            cargarZonaCreativa();
            renderizarCalendario();
        }

        async function cargarZonaCreativa() {
            const { data } = await supabase
                .from('zona_creativa')
                .select('*')
                .eq('cliente_id', clienteActual.id)
                .eq('programado', false);

            ideasActuales = data || [];
            renderizarZonaCreativa();
        }

        function renderizarZonaCreativa() {
            const tabla = document.getElementById('zona-tabla');
            tabla.innerHTML = ideasActuales.map(idea => `
                <tr>
                    <td>${idea.nombre_idea}</td>
                    <td>${idea.formato}</td>
                    <td>${idea.pilar_contenido}</td>
                    <td><span class="state-badge por-grabar">${idea.estado}</span></td>
                    <td>
                        <button class="btn-mover" onclick="editarIdea('${idea.id}')">Editar</button>
                        <button class="btn-mover" onclick="moverACalendario('${idea.id}')">▶ Programar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function renderizarCalendario() {
            const año = mesActual.getFullYear();
            const mes = mesActual.getMonth();

            document.getElementById('mes-actual').textContent = 
                `${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][mes]} ${año}`;

            const inicio = new Date(año, mes, 1);
            const fin = new Date(año, mes + 1, 0);

            const { data: eventos } = await supabase
                .from('calendario_mensual')
                .select('*')
                .eq('cliente_id', clienteActual.id)
                .gte('fecha', inicio.toISOString().split('T')[0])
                .lte('fecha', fin.toISOString().split('T')[0]);

            const eventosMap = {};
            (eventos || []).forEach(e => {
                eventosMap[e.fecha] = e;
            });

            const primerDia = inicio.getDay();
            const diasMes = new Date(año, mes + 1, 0).getDate();

            let html = '';
            for (let i = 0; i < primerDia; i++) {
                html += '<div class="day-box"></div>';
            }

            for (let dia = 1; dia <= diasMes; dia++) {
                const fecha = `${año}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const evento = eventosMap[fecha];
                const estadoClass = evento ? evento.estado.toLowerCase().replace(/ /g, '-') : '';
                
                html += `
                    <div class="day-box" onclick="abrirDia('${fecha}')">
                        <div class="day-number">${dia}</div>
                        ${evento ? `
                            <div class="day-idea">${evento.conmemoracion}</div>
                            <span class="state-badge ${estadoClass}">${evento.estado}</span>
                        ` : ''}
                    </div>
                `;
            }

            document.getElementById('calendario').innerHTML = html;
        }

        window.mesAnterior = () => {
            mesActual.setMonth(mesActual.getMonth() - 1);
            renderizarCalendario();
        };

        window.mesSiguiente = () => {
            mesActual.setMonth(mesActual.getMonth() + 1);
            renderizarCalendario();
        };

        window.abrirDia = (fecha) => {
            alert(`Día: ${fecha}`);
        };

        window.editarIdea = (id) => {
            const idea = ideasActuales.find(i => i.id === id);
            if (idea) {
                document.getElementById('form-nombre').value = idea.nombre_idea;
                document.getElementById('form-formato').value = idea.formato;
                document.getElementById('form-pilar').value = idea.pilar_contenido;
                document.getElementById('form-estado').value = idea.estado;
                document.getElementById('form-url').value = idea.url || '';
                document.getElementById('form-clips').value = idea.clips || '';
                document.getElementById('form-guion').value = idea.guion || '';
                document.getElementById('form-copy').value = idea.copy_final || '';
                document.getElementById('modalEditar').classList.add('active');
                document.getElementById('modalEditar').dataset.ideaId = id;
            }
        };

        window.guardarEdicion = async () => {
            const ideaId = document.getElementById('modalEditar').dataset.ideaId;
            const actualizado = {
                nombre_idea: document.getElementById('form-nombre').value,
                formato: document.getElementById('form-formato').value,
                pilar_contenido: document.getElementById('form-pilar').value,
                estado: document.getElementById('form-estado').value,
                url: document.getElementById('form-url').value,
                clips: document.getElementById('form-clips').value,
                guion: document.getElementById('form-guion').value,
                copy_final: document.getElementById('form-copy').value
            };

            await supabase
                .from('zona_creativa')
                .update(actualizado)
                .eq('id', ideaId);

            cerrarModal();
            cargarZonaCreativa();
        };

        window.cerrarModal = () => {
            document.getElementById('modalEditar').classList.remove('active');
        };

        window.moverACalendario = async (ideaId) => {
            const fecha = prompt('Ingresa la fecha (YYYY-MM-DD):');
            if (fecha) {
                await supabase
                    .from('calendario_mensual')
                    .insert({
                        cliente_id: clienteActual.id,
                        idea_id: ideaId,
                        fecha: fecha,
                        estado: 'POR GRABAR'
                    });

                await supabase
                    .from('zona_creativa')
                    .update({ programado: true, fecha_calendario: fecha })
                    .eq('id', ideaId);

                cargarZonaCreativa();
                renderizarCalendario();
                alert('Idea programada en el calendario');
            }
        };

        init();
    </script>
</body>
</html>
